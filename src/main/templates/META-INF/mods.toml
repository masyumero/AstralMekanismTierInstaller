modLoader="javafml"
loaderVersion = "[47,)"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
#logoFile="examplemod.png"
authors="${mod_authors}"
description='''${mod_description}'''

    [[dependencies.${mod_id}]]
    modId = "forge"
    mandatory = true
    versionRange = "[${forge_version},)"
    ordering = "AFTER"
    side = "BOTH"
    [[dependencies.${mod_id}]]
    modId = "minecraft"
    mandatory = true
    versionRange = "[${minecraft_version},)"
    ordering = "AFTER"
    side = "BOTH"
    [[dependencies.${mod_id}]]
    modId = "astral_mekanism"
    mandatory = true
    versionRange = "[1.7.17,)"
    ordering = "AFTER"
    side = "BOTH"
